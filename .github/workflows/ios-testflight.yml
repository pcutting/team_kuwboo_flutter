name: iOS TestFlight

on:
  # Manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      environment:
        description: "KUWBOO_ENV to build"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - staging
      build_number:
        description: "Explicit build number (leave blank for auto)"
        required: false
        default: ""

  # Automatic on tagged releases
  push:
    tags:
      - "ios-v*"

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  testflight:
    name: Build and upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: apps/mobile

    env:
      FLUTTER_VERSION: "3.41.4"
      XCODE_VERSION: "16.0"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app || sudo xcode-select -s /Applications/Xcode.app
        working-directory: .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: apps/mobile/ios

      - name: Install CocoaPods
        run: bundle exec pod install --repo-update
        working-directory: apps/mobile/ios

      - name: Install Apple signing certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        working-directory: .
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode base64 into a temporary .p12 file
          printf '%s' "$P12_BASE64" | base64 --decode > "$CERT_PATH"

          # Remove any prior keychain at this path (idempotency across re-runs)
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

          # Create fresh keychain, disable auto-lock, unlock
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # REPLACE the user search list with our keychain (not prepend)
          # and set as default keychain. This is the pattern apple-actions/
          # import-codesign-certs uses and is known to persist across GH Actions steps.
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          # Import the distribution cert + private key
          security import "$CERT_PATH" -P "$P12_PASSWORD" -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign -T /usr/bin/security

          # Allow codesign to use the private key non-interactively
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null

          # Sanity check — should list our Apple Distribution identity
          security find-identity -p codesigning -v

          # Clean up the decoded .p12 (key is now in the keychain)
          rm -f "$CERT_PATH"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          PROFILE_UUID: ${{ secrets.APPLE_PROVISIONING_PROFILE_UUID }}
        working-directory: .
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          printf '%s' "$PROFILE_BASE64" | base64 --decode \
            > "$PROFILE_DIR/$PROFILE_UUID.mobileprovision"
          echo "Installed provisioning profile: $PROFILE_UUID"
          ls -la "$PROFILE_DIR"

      - name: Verify keychain state before Fastlane
        working-directory: .
        run: |
          echo "--- search list (user) ---"
          security list-keychains -d user
          echo ""
          echo "--- default keychain (user) ---"
          security default-keychain -d user
          echo ""
          echo "--- codesigning identities ---"
          security find-identity -p codesigning -v
          echo ""
          echo "--- provisioning profiles ---"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>&1 || true

      - name: Run Fastlane beta
        working-directory: apps/mobile/ios
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APPLE_KEY_P8_BASE64 }}
          APP_STORE_CONNECT_API_KEY_IS_BASE64: "true"
          KUWBOO_ENV: ${{ github.event.inputs.environment || 'prod' }}
          BUILD_NUMBER: ${{ github.event.inputs.build_number || github.run_number }}
          FASTLANE_HIDE_CHANGELOG: "1"
          FASTLANE_SKIP_UPDATE_CHECK: "1"
          FASTLANE_DISABLE_COLORS: "1"
        run: bundle exec fastlane beta

      - name: Upload build artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: |
            apps/mobile/build/ios/archive/*.xcarchive/Logs/
            apps/mobile/ios/fastlane/report.xml
          retention-days: 7
          if-no-files-found: ignore
