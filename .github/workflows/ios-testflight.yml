name: iOS TestFlight

on:
  # Manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      environment:
        description: "KUWBOO_ENV to build"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - staging
      build_number:
        description: "Explicit build number (leave blank for auto)"
        required: false
        default: ""

  # Automatic on tagged releases
  push:
    tags:
      - "ios-v*"

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  testflight:
    name: Build and upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: apps/mobile

    env:
      FLUTTER_VERSION: "3.41.4"
      XCODE_VERSION: "16.0"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app || sudo xcode-select -s /Applications/Xcode.app
        working-directory: .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: apps/mobile/ios

      - name: Install CocoaPods
        run: bundle exec pod install --repo-update
        working-directory: apps/mobile/ios

      - name: Install signing material and run Fastlane beta
        working-directory: apps/mobile/ios
        env:
          P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          PROFILE_UUID: ${{ secrets.APPLE_PROVISIONING_PROFILE_UUID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APPLE_KEY_P8_BASE64 }}
          APP_STORE_CONNECT_API_KEY_IS_BASE64: "true"
          KUWBOO_ENV: ${{ github.event.inputs.environment || 'prod' }}
          BUILD_NUMBER: ${{ github.event.inputs.build_number || github.run_number }}
          FASTLANE_HIDE_CHANGELOG: "1"
          FASTLANE_SKIP_UPDATE_CHECK: "1"
          FASTLANE_DISABLE_COLORS: "1"
        run: |
          set -e

          # =====================================================
          # 1. Install Apple Distribution cert into a fresh keychain
          # =====================================================
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          printf '%s' "$P12_BASE64" | base64 --decode > "$CERT_PATH"

          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Replace user search list (not prepend); set as default keychain
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$P12_PASSWORD" -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null

          rm -f "$CERT_PATH"

          echo "=== Signing identity visible in this shell ==="
          security find-identity -p codesigning -v

          # =====================================================
          # 2. Install provisioning profile
          # =====================================================
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          printf '%s' "$PROFILE_BASE64" | base64 --decode \
            > "$PROFILE_DIR/$PROFILE_UUID.mobileprovision"
          echo "=== Provisioning profiles ==="
          ls -la "$PROFILE_DIR"

          # =====================================================
          # 3. Flush cfprefsd cache so subprocesses see fresh prefs
          # (belt-and-braces: macOS CFPreferences has a caching daemon
          #  that can serve stale values to new processes)
          # =====================================================
          killall cfprefsd 2>/dev/null || true

          # =====================================================
          # 4. Run Fastlane beta (same shell, no step boundary)
          # =====================================================
          bundle exec fastlane beta

      - name: Upload build artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: |
            apps/mobile/build/ios/archive/*.xcarchive/Logs/
            apps/mobile/ios/fastlane/report.xml
          retention-days: 7
          if-no-files-found: ignore
