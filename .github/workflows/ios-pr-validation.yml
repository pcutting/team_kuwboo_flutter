name: iOS PR Validation

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/models/**"
      - "packages/api_client/**"
      - "packages/kuwboo_shell/**"
      - "packages/kuwboo_screens/**"
      - "packages/kuwboo_chat/**"
      - "packages/kuwboo_auth/**"
      - ".github/workflows/ios-pr-validation.yml"

concurrency:
  group: ios-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Flutter analyze + iOS simulator build
    runs-on: macos-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/mobile

    env:
      FLUTTER_VERSION: "3.41.4"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

      - name: Build iOS (no codesign, simulator)
        run: flutter build ios --debug --no-codesign --simulator --dart-define=KUWBOO_ENV=staging
