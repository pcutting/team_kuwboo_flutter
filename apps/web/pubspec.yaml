name: kuwboo_web
description: Kuwboo web application
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.1

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  kuwboo_shell:
    path: ../../packages/kuwboo_shell
  kuwboo_screens:
    path: ../../packages/kuwboo_screens
  kuwboo_chat:
    path: ../../packages/kuwboo_chat
  kuwboo_auth:
    path: ../../packages/kuwboo_auth
  kuwboo_models:
    path: ../../packages/models
  kuwboo_api_client:
    path: ../../packages/api_client
  flutter_riverpod: ^2.6.0
  go_router: ^14.0.0
  dio: ^5.7.0
  google_fonts: ^8.0.0
  phosphor_flutter: ^2.1.0
  lucide_icons_flutter: ^3.1.10
  heroicons_flutter: ^0.4.0
  iconsax_flutter: ^1.0.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
