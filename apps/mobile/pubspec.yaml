name: kuwboo_mobile
description: Kuwboo mobile application (iOS + Android)
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.1

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  kuwboo_shell:
    path: ../../packages/kuwboo_shell
  kuwboo_screens:
    path: ../../packages/kuwboo_screens
  kuwboo_chat:
    path: ../../packages/kuwboo_chat
  kuwboo_models:
    path: ../../packages/models
  kuwboo_api_client:
    path: ../../packages/api_client
  flutter_riverpod: ^2.6.0
  go_router: ^14.0.0
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.0
  firebase_core: ^3.12.1
  firebase_crashlytics: ^4.3.5
  phone_form_field: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
