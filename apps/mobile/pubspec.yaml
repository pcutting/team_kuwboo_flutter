name: kuwboo_mobile
description: Kuwboo mobile application (iOS + Android)
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.1

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  kuwboo_shell:
    path: ../../packages/kuwboo_shell
  kuwboo_screens:
    path: ../../packages/kuwboo_screens
  kuwboo_chat:
    path: ../../packages/kuwboo_chat
  kuwboo_auth:
    path: ../../packages/kuwboo_auth
  kuwboo_models:
    path: ../../packages/models
  kuwboo_api_client:
    path: ../../packages/api_client
  flutter_riverpod: ^2.6.0
  go_router: ^14.0.0
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.0
  firebase_core: ^3.12.1
  firebase_crashlytics: ^4.3.5
  sign_in_with_apple: ^7.0.1
  google_sign_in: ^7.2.0
  firebase_messaging: ^15.2.10
  geolocator: ^14.0.2
  socket_io_client: ^3.1.4
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.6
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/images/app_icon.png"
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  adaptive_icon_background: "#CB6843"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#CB6843"
  image: assets/images/app_icon.png
  android_12:
    color: "#CB6843"
    image: assets/images/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
