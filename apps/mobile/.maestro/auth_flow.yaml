appId: com.kuwboo.mobile
name: Auth — welcome + method smoke (B1-B3 only)
tags:
  - auth
  - smoke
---
# Original 3-step smoke. Kept as a fast pre-flight check; the full B1-B14
# walkthrough lives at walkthrough.yaml. All selectors use stable testIDs
# from AuthIds — no text matching, so theme/copy edits don't break it.

- launchApp:
    stopApp: true
    permissions:
      all: allow

# Welcome screen renders with the four entry buttons (no test banner here).
- assertVisible:
    id: "auth.welcome.btn_create_account"
- assertVisible:
    id: "auth.welcome.btn_login"
- assertVisible:
    id: "auth.welcome.btn_apple"
- assertVisible:
    id: "auth.welcome.btn_google"
- assertNotVisible: "TEST BUILD"

# Nav into method.
- tapOn:
    id: "auth.welcome.btn_create_account"
- assertVisible:
    id: "auth.method.btn_phone_email"
- assertVisible:
    id: "auth.method.btn_google"
- assertVisible:
    id: "auth.method.btn_apple"

# Nav into phone/email screen, switch tabs.
- tapOn:
    id: "auth.method.btn_phone_email"
- assertVisible:
    id: "auth.phone.tab_phone"
- assertVisible:
    id: "auth.phone.tab_email"

- tapOn:
    id: "auth.phone.tab_email"
- assertVisible:
    id: "auth.phone.tab_email"
- assertVisible:
    id: "auth.email.field_email"
