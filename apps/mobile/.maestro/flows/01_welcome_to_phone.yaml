appId: com.kuwboo.mobile
name: B1-B4 — Welcome → Method → Phone (digits typed)
---
# B1: cold-start welcome screen renders.
- assertVisible:
    id: "auth.welcome.btn_create_account"
- assertVisible:
    id: "auth.welcome.btn_login"
- assertVisible:
    id: "auth.welcome.btn_apple"
- assertVisible:
    id: "auth.welcome.btn_google"
- takeScreenshot: /tmp/walkthrough_b1_welcome

# B2: tap Create Account → method screen.
- tapOn:
    id: "auth.welcome.btn_create_account"
- assertVisible:
    id: "auth.method.btn_phone_email"
- assertVisible:
    id: "auth.method.btn_google"
- assertVisible:
    id: "auth.method.btn_apple"
- assertVisible:
    id: "auth.method.link_terms"
- assertVisible:
    id: "auth.method.link_privacy"

# B3: tap "Use phone or email" → tabbed phone/email screen.
- tapOn:
    id: "auth.method.btn_phone_email"
- assertVisible:
    id: "auth.phone.tab_phone"
- assertVisible:
    id: "auth.phone.tab_email"
- assertVisible:
    id: "auth.phone.field_phone"

# Send Code button is in the tree (state assertions covered by widget
# tests — Maestro's iOS driver doesn't expose enabled flag via selector).
- assertVisible:
    id: "auth.phone.send_code"

# B4: type the user's number into the phone field, dismiss the keyboard.
- tapOn:
    id: "auth.phone.field_phone"
- inputText: "6143002053"
- tapOn:
    id: "auth.phone.label_phone"   # inert text label — replaces hideKeyboard
- takeScreenshot: /tmp/walkthrough_b4_phone_ready
