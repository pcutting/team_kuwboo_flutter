name: kuwboo_auth
description: Kuwboo authentication screens — welcome, onboarding, OTP, signup, login, birthday, profile
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.1

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  kuwboo_shell:
    path: ../kuwboo_shell
  kuwboo_models:
    path: ../models
  kuwboo_api_client:
    path: ../api_client
  flutter_riverpod: ^2.6.0
  intl_phone_field: ^3.2.0
  phone_numbers_parser: ^9.0.21
  flutter_svg: ^2.0.14
  go_router: ^14.0.0
  # Crashlytics is tried from release builds in `_auth_error_ui.dart`. The
  # package must tolerate Firebase not being initialised (dev builds without
  # google-services.json) — the call is wrapped in try/catch for that reason.
  firebase_crashlytics: ^4.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
