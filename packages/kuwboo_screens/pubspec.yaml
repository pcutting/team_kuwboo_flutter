name: kuwboo_screens
description: Kuwboo feature screens — yoyo, video, dating, social, shop, profile, sponsored
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.1

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  kuwboo_shell:
    path: ../kuwboo_shell
  kuwboo_chat:
    path: ../kuwboo_chat
  kuwboo_auth:
    path: ../kuwboo_auth
  kuwboo_models:
    path: ../models
  kuwboo_api_client:
    path: ../api_client
  flutter_riverpod: ^2.6.0
  go_router: ^14.0.0
  # Used by dating_card_stack to introspect DioException error codes
  # returned by the DatingAgeGuard (dob_required / dob_privacy_declined /
  # dob_skipped). Re-declared here rather than leaning on api_client's
  # transitive dep so the dependency is explicit at the import site.
  dio: ^5.7.0
  # Avatar picker — web uses the file chooser; mobile uses the native
  # gallery / camera. Camera on web falls back to file chooser.
  image_picker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
